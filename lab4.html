<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 4 – CSS Methods</title>

    <style>
        /* Internal CSS */

        body {
            background-color: yellow;
            font-family: Arial, sans-serif;
        }

        h2 {
            color: red;
        }

        .internal-para {
            font-size: 16px;
            line-height: 1.5;
        }

        h3 {
            color: purple;
            text-decoration: underline;
        }

        .external-para {
            color: darkblue;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <!-- Inline CSS -->
    <h1 style="color: blue; text-align: center;">
        Welcome to Lab 4
    </h1>

    <p style="color: green; font-size: 18px;">
        This paragraph uses Inline CSS.
    </p>

    <!-- Internal CSS -->
    <h2>Internal CSS Example</h2>

    <p class="internal-para">
        This paragraph is styled using Internal CSS.
    </p>

    <!-- External CSS Example -->
    <h3>External CSS Example</h3>

    <p class="external-para">
        This paragraph is styled using External CSS properties.
    </p>

</body>
</html>
